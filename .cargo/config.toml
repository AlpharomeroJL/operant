# Target-scoped only: does not affect native builds or CI's default
# workspace build/tests. Required so `getrandom` (pulled in transitively via
# `ahash`, itself pulled in by dependencies of `operant-action`) picks the
# browser RNG backend when operant-replay is compiled for wasm32-unknown-unknown
# with the `wasm` feature. See crates/replay/Cargo.toml and
# https://docs.rs/getrandom/latest/getrandom/#webassembly-support.
[target.wasm32-unknown-unknown]
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]
